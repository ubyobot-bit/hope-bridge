{% extends "base.html" %}
{% block title %}Register - HopeBridge{% endblock %}

{% block shell %}
<main class="register-page">
    {% include "partials/flash_messages.html" %}
    <div class="register-art">
        <a class="brand-mark" href="{{ url_for('home') }}"><span class="brand-icon"><i class="bi bi-flower1"></i></span>HopeBridge</a>
        <div class="big-heart"><i class="bi bi-heart-fill"></i></div>
    </div>
    <section class="auth-card register-card">
        <h1>Create Account</h1>
        <p>Join us and make a difference</p>
        <form method="post">
            <label>Full Name</label>
            <input class="form-control" name="name" placeholder="Enter your full name" required>
            <label>Email Address</label>
            <input class="form-control" type="email" name="email" placeholder="Enter your email" required>
            <label>Password</label>
            <div class="password-wrap">
                <input class="form-control" type="password" name="password" placeholder="Create a password" required>
                <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <label>Confirm Password</label>
            <div class="password-wrap">
                <input class="form-control" type="password" name="confirm" placeholder="Confirm your password" required>
                <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <button class="btn btn-primary w-100 mt-3">Register</button>
        </form>
        <p class="auth-bottom">Already have an account? <a href="{{ url_for('login') }}">Login here</a></p>
    </section>
</main>
{% endblock %}
