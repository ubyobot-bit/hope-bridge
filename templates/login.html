{% extends "base.html" %}
{% block title %}Login - HopeBridge{% endblock %}

{% block shell %}
<main class="auth-page">
    <a class="brand-mark auth-brand" href="{{ url_for('home') }}"><span class="brand-icon"><i class="bi bi-flower1"></i></span>HopeBridge</a>
    <section class="auth-card">
        <h1>Welcome Back</h1>
        <p>Sign in to your account</p>
        <form method="post">
            <label>Email Address</label>
            <input class="form-control" type="email" name="email" placeholder="Enter your email" required>
            <label>Password</label>
            <div class="password-wrap">
                <input class="form-control" type="password" name="password" placeholder="Enter your password" required>
                <button type="button" class="password-toggle"><i class="bi bi-eye"></i></button>
            </div>
            <div class="d-flex justify-content-between align-items-center small my-3">
                <label class="check-line"><input type="checkbox"> Remember me</label>
                <a href="#">Forgot Password?</a>
            </div>
            <button class="btn btn-primary w-100">Login</button>
        </form>
        <div class="or-line">Or continue with</div>
        <div class="row g-3">
            <div class="col-6"><button class="btn social-btn w-100"><i class="bi bi-google"></i> Google</button></div>
            <div class="col-6"><button class="btn social-btn w-100"><i class="bi bi-facebook"></i> Facebook</button></div>
        </div>
        <p class="auth-bottom">Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
    </section>
</main>
{% endblock %}
