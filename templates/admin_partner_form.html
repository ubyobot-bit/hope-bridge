{% extends "base.html" %}
{% block title %}Partner Form - HopeBridge{% endblock %}

{% block content %}
<section class="section-pad admin-page">
    <div class="container">
        <div class="section-heading"><div><p class="eyebrow">Admin Control</p><h1>{{ 'Edit' if partner.id else 'New' }} Partner</h1></div><a class="btn btn-outline-primary" href="{{ url_for('admin_content') }}">Back</a></div>
        <form class="panel-card admin-form" method="post">
            <div class="row g-3">
                <div class="col-md-6"><label>Name</label><input class="form-control" name="name" value="{{ partner.name or '' }}" required></div>
                <div class="col-md-3"><label>Logo Text</label><input class="form-control" name="logo" value="{{ partner.logo or '' }}" required></div>
                <div class="col-md-3"><label>Sort Order</label><input class="form-control" type="number" name="sort_order" value="{{ partner.sort_order or 0 }}"></div>
                <div class="col-md-6"><label>Caption</label><input class="form-control" name="caption" value="{{ partner.caption or '' }}" required></div>
                <div class="col-md-6"><label>Website</label><input class="form-control" name="website" value="{{ partner.website or '' }}"></div>
                <div class="col-12"><label class="form-check"><input class="form-check-input" type="checkbox" name="published" {% if partner.published or not partner.id %}checked{% endif %}> Published</label></div>
            </div>
            <button class="btn btn-primary mt-4" type="submit">Save Partner</button>
        </form>
    </div>
</section>
{% endblock %}
