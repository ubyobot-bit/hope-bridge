{% set percent = campaign.progress %}
<article class="campaign-card">
    <div class="campaign-image">
        <img src="{{ campaign.image }}" alt="{{ campaign.title }}">
        <span>{{ campaign.category }}</span>
    </div>
    <div class="campaign-body">
        <h3>{{ campaign.title }}</h3>
        <p>{{ campaign.summary }}</p>
        <div class="campaign-urgency">
            <div>
                <strong>{{ percent }}% Funded</strong>
                <span>{{ campaign_days_remaining(campaign) }} days remaining</span>
            </div>
            <small>{{ campaign.raised | money }} raised of {{ campaign.goal | money }} goal</small>
        </div>
        <div class="progress slim-progress" aria-label="{{ percent }} percent funded">
            <div class="progress-bar" style="width: {{ percent }}%"></div>
        </div>
        <a class="btn btn-primary w-100" href="{{ url_for('campaign_detail', campaign_id=campaign.id) }}">Donate Now</a>
    </div>
</article>
