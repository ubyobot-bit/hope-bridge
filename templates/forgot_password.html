{% extends "base.html" %}
{% block title %}Forgot Password - HopeBridge{% endblock %}

{% block shell %}
<main class="auth-page">
    {% include "partials/flash_messages.html" %}
    <section class="auth-card">
        <h1>Reset Password</h1>
        <p>Enter your account email to create a reset link.</p>
        <form method="post">
            <label>Email Address</label>
            <input class="form-control" type="email" name="email" required>
            <button class="btn btn-primary w-100 mt-3">Create Reset Link</button>
        </form>
        <p class="auth-bottom"><a href="{{ url_for('login') }}">Back to login</a></p>
    </section>
</main>
{% endblock %}
